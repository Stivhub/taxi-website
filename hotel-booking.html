<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Premium hotel booking in Rajasthan. Explore Jaisalmer and beyond with our top-tier partnered hotels.">
  <title>Hotel Booking | YashmeeTours</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">

  <style>
    .page-header {
      padding-top: 150px;
      padding-bottom: 60px;
      background: linear-gradient(135deg, var(--c-primary), var(--c-secondary));
      color: var(--c-background);
      text-align: center;
    }

    .page-header h1 {
      color: var(--c-background);
      font-size: 3rem;
      margin-bottom: 15px;
    }

    /* QUICK BOOKING WIDGET */
    .hotel-booking-section {
      padding: var(--section-padding);
      background-color: var(--c-background);
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar delay-100">
    <div class="container">
      <div class="topbar-left">
        <a href="tel:+917728057171">📞 +91 77280 57171</a>
        <a href="mailto:yashmeetours@gmail.com">✉️ yashmeetours@gmail.com</a>
      </div>
      <div class="topbar-right">
        <a href="https://instagram.com/yashmee_tours" target="_blank" title="Instagram">📷 Instagram</a>
        <a href="#" title="TripAdvisor">🦉 TripAdvisor</a>
      </div>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar scrolled">
    <div class="container">
      <a href="index.html" class="nav-logo">Yashmee<span>Tours</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="fleet.html">Our Fleet</a>
        <a href="packages.html">Tour Packages</a>
        <a href="hotel-booking.html" class="active">Hotel Booking</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Contact</a>
      </div>
      <button class="hamburger">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <section class="page-header delay-100">
    <div class="container fade-down">
      <h1>Book Your Stay in Jaisalmer</h1>
      <p style="color: rgba(255,255,255,0.8); font-size: 1.1rem;">Experience the royal hospitality of Rajasthan</p>
    </div>
  </section>

  <!-- HOTEL BOOKING WIDGET -->
  <section class="hotel-booking-section">
    <div class="container">
      <div class="booking-card reveal">
        <h3 class="mb-2" style="font-family: var(--font-heading); color: var(--c-primary); text-align: center;" id="booking-heading">Book
          Your Stay</h3>

        <form id="hotel-booking-form">

          <!-- ===== SHARED FIELDS ===== -->
          <div class="form-fields-group visible" id="shared-fields">
            <div class="form-group">
              <label for="name">Your Name</label>
              <input type="text" id="name" class="form-control" placeholder="E.g., Rahul Sharma" required>
            </div>
            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" class="form-control" placeholder="E.g., 77280 57171" required>
            </div>
          </div>

          <!-- ===== HOTEL FIELDS ===== -->
          <div class="form-fields-group visible" id="hotel-fields" style="display: grid; opacity: 1; transform: none;">
            <div class="form-group">
              <label for="checkin">Check-in Date</label>
              <input type="date" id="checkin" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="checkout">Check-out Date</label>
              <input type="date" id="checkout" class="form-control" required>
            </div>
            <div class="form-group">
              <label for="guests">Number of Guests</label>
              <input type="number" id="guests" class="form-control" placeholder="E.g., 2" min="1" max="50" required>
            </div>
            <div class="form-group">
              <label for="hotel-type">Hotel Type</label>
              <select id="hotel-type" class="form-control" required>
                <option value="" disabled selected>Select Hotel Type</option>
                <option>Budget</option>
                <option>Deluxe</option>
                <option>Luxury</option>
              </select>
            </div>
            <div class="form-group form-group-full" style="grid-column: 1 / -1; width: 100%;">
              <label for="special-requests">Special Requests (Optional)</label>
              <textarea id="special-requests" class="form-control-textarea"
                placeholder="E.g., Ground floor room, extra bed, desert view..." rows="3"></textarea>
            </div>
          </div>

          <!-- ===== SUBMIT ===== -->
          <div class="form-fields-group visible" id="submit-group">
            <div class="form-group form-group-full">
              <button type="submit" id="booking-btn" class="btn btn-primary">
                Book Hotel via WhatsApp
              </button>
              <p id="booking-status"
                style="text-align:center; margin-top:12px; font-weight:600; color: var(--c-secondary); display:none;">
              </p>
            </div>
          </div>

        </form>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer reveal">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 YashmeeTours. All Rights Reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>

</html>
